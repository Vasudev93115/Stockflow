name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (Optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/vasudev93115/stockflow-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/stockflow-backend:latest', secrets.DOCKERHUB_USERNAME) || '' }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://localhost:8000
          tags: |
            ghcr.io/vasudev93115/stockflow-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/stockflow-frontend:latest', secrets.DOCKERHUB_USERNAME) || '' }}
